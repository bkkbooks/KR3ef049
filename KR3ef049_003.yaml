seq: 3
front:
  text: 卷第三三葉後八行注為陽薛本為下有發於二字張本同五葉十行發後無汗薛本發下有汗字顧本同後三行引小腹入陰筋者各本同按此乃仲景傷寒論原文但原文引上有痛字此痛字似不可少六葉三行注雜發汗薛本同張本雜作可按當作可為是八行如被杖薛本張本如字上俱有身痛二字按此亦仲景原文本有此二字後八行勿以煙出薛本以作使七葉五行通逐薛本張本逐俱作達八行裡熱藥薛本顧本里俱作裹按當作裹為是八葉四行為狀薛本為下有病字六行其面乍黑乍白薛本張本面字下皆多乍赤二字乍白下皆多蝕於二字七行咽乾薛本張本咽乾下皆多苦參湯洗之五字八行注雄黃云云止張本另提行起有苦參半斤槐白皮四兩狼牙根四兩上銼以水五升煎三升半洗之云云二行方另提行起接病者脈數云云薛本此方附注於上又則熱薛本張本則俱作無按金匱本文作無後二行細末一行後張本多通治狐惑黃連一兩藎草二兩上為末每服四錢水一盞半煎八分去滓溫溫服之云云三行薛本亦多此方附注於上後五行美薛本顧本俱作美後九行浙然各本俱作淅九葉四行兩漬字原本均作潰誤今照各本改正十葉二行如煎洗薛本張本煎洗俱作前浸按下有漬字若用浸字則重意當作如前洗為是後五行所至薛本至作致後八行反不惡寒按仲景原文無不字十一葉按此葉非宋刻原刊三行而故薛本張本故俱作熱又而避害原本避字模糊今依薛本張本補又而為郡若汗太多原本模糊薛本張本郡俱作汗大俱作太顧本郡作大亦作太八行強項薛本張本俱作項強按項字原本系壞字作曰八而抄本誤作曰今依薛本張本改作項字顧本亦誤作曰又熱令薛本張本俱作令熱後九行齗齒各本俱作齘齒案齗字誤當作齘為是後十行注方在可下門中薛本同張本顧本門俱作證十二葉一行濕證張本證作候三行注水證張本水上有可字按可字當有五行身汗出薛本張本身下俱有重字後六行濕家下之額上汗出微喘小便不利者死按此乃仲景原文也但原文乃小便利者死以額汗微喘為孤陽無根而上脫加以小便利為陰氣不藏而下泄故主死也若小便不利乃濕家本症何云死耶薛本張本並同又案尤在涇金匱心典曰一作小便不利者死謂陽上遊而陰不下濟也亦通十三葉三行含水畜薛本畜作搐六行可與杏仁薏苡湯薛本作可與麻黃杏仁薏苡甘草湯後七行故使之耳薛本張本之俱作然後八行則極薛本作痛劇十四葉三行溢水薛本溢作添顧本作溫五行暍證張本證作候後二行弦而細芤而遲薛本無兩而字後三行口前開薛本作口開前後四行反熱甚薛本反作發十五葉六行宜苦酒艾原本苦作若誤今照薛本顧本改按苦酒即醋也九行茯苓桂枝湯主之薛本作茯苓桂枝甘草大棗湯主之後八行酒二盞煎二盞四分薛本同張本作酒二盞煎一盞四分顧本作酒二盞四分煎二盞後九行膀胱薛本作臍旁十八葉後九行理中治中焦薛本治上有者字二十一葉後八行伸吟薛本張本伸俱作呻按當作呻為是二十二葉後四行肉豆草薛本草作蔻顧本作榖誤二十五葉六行血不止原本作上今依薛本改正二十六葉九行𧈟瘡薛本作𧈟按此誤當作𧈟後四行同二十九葉一行草一分薛本張本草上皆有甘按原本脫去三十葉六行且至晚薛本且作旦三十三葉二行灰燒薛本無燒字三行陰頭薛本陰頭下俱有穴字七行陰卯薛本卯作卵是後一行去皮尖薛本去皮核按當以去皮核為是蓋大棗亦無尖可去也
