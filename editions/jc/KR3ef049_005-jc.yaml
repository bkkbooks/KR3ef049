body:
  text: 卷第五二葉八行手太陰水薛本顧本水俱作金按當從金為是後二行相形薛本形作刑後九行注庵園薛本園作圓三葉後四行鼻竅中薛本竅下有內兩陷三字中下有旁字後七行以紙筋探鼻中嚏之薛本作以紙筋紉鼻中嚏出之四葉七行柏實薛本此下尚有射干枳實二味十行三日服之薛本張本同顧本之作遇疑誤後四行蝟按原本作螺誤以後修治藥法內所引證之當作蝟今改正薛本亦作蝟顧本作騾亦誤五葉二行五兵白刃盜賊凶害薛本此八字接連上行諸毒下而者冠軍云云另提行起者又作昔後三行住丸薛本住作五又左闢各本俱作臂後八行地深三尺與深同張本地深之深作闊薛本尺下有廣字顧本與作余六葉四行反張本顧本俱作及又其病薛本病下有相反二字七行府薛本作胻後五行合自薛本自作身七葉四行所侵薛本侵下有內熱二字又咽塞薛本塞下有聲嘶二字後三行閞格薛本閞作開顧本作闗是後五行毒氣薛本氣字逕接其病相反四字而下又多若腑虛則陰邪所加八字方接頭重頸直皮肉強痹八字頸字原本作項痹字原本所無後六行頸下薛本下作側八葉三行腧原本作踰誤今依各本改七行狀薛本作秋後五行生班張本顧本皆作斑九葉五行陽毒薛本陽字上有則為二字六行彭薛本顧本皆作膨十葉後六行煎去薛本去作取十一葉八行汗原本誤作汁今依薛本張本改後一行洞薛本張本同顧本作十三葉後五行素傷於寒因復傷於寒薛本上寒字作風張本下寒字作熱後十行米中病薛本米作未未字下又多來字疑衍張本顧本皆作未十四葉九行病苦薛本苦作若十行又顧本作及後十行素傷於熱薛本熱作寒十五葉按此葉宋本原缺張本顧本亦皆無今照薛本補全又以顧抱沖所抄王宇泰活字本校其異同亦載於此二行本太云云顧抄本連上四行寸口云云顧抄本亦連上又數滑顧抄本作滑數五行陽盛怫鬱顧抄本陽作熱怫作沸七行如搏顧抄本如作相八行注亦薛本原作六疑誤今照顧抄本改十行湯字下顧抄本有不可作煮散五字又治如前證顧抄本此四字在前一行下後一行麻黃顧抄本此下有去節二字後二行㕮咀此二字顧抄本缺後三行深師方曰此四字顧抄本無後四行呻吟顧抄本此下有而已二字後五行未解此下顧抄本有今且用解毒湯則拘索不瘥十一字又古方古字顧抄本作而又思思字上顧抄本有意字後六行解字顧抄本作救又故用三黃石膏湯顧抄本故字上有是字三黃兩字無湯字下空一格有前用三黃石膏湯一句後七行論曰顧抄本作龐曰後八行身目顧抄本作身眼後九行湯字下顧抄本空一格有前方二字十六葉六行異語薛本異作譫後三行蜘蟵薛本顧本俱作踟躕十七葉九行荒言薛本荒作譫後四行加附子嚾下薛本嚾作灌十八葉六行畜搦薛本畜作搐後一行芫花薛本下有米醋浸搦干瓦上炒八字
