seq: 1
front:
  text: 卷第一一葉十行冰也案也字衍薛本顧本俱無後三行其有顧本有作人非又勞房薛本房作力三葉十行故須薛本作又須按又字是後三行而變暑病顧本病下有所宜二字後十行有平居者薛本作有卑濕居者四葉後八行揮散薛本顧本揮俱作憚後十行工薛本此上有粗字五葉三行欲溫原本欲字破損今照顧本補薛本張本皆作飲非六葉後一行足薛本作更按更字是後十行虛寒顧本作虛汗非七葉六行一二日發以上連風府薛本上有當字以下有其脈二字八葉後四行大湯劑原本大作人今依薛本改十葉九行自微汗薛本自作身非後十行大便已鞭薛本鞭作硬按原本硬作鞭者甚多不能悉正皆當從硬為是後仿此十一葉後五行而又脈顧本又作反後八行當二三日發原本作二二日誤今依薛本顧本改張本作三四日是後九行而聾薛本作而耳聾顧本作耳聾後十行相載薛本作相搏十二葉後九行傷寒三四日陽為盡薛本作傷寒三日三陽為盡顧本作傷寒三四日三陽為盡按當依薛本是十四葉五行注故芍藥薛本作但以芍藥十行於寐也宋本有脫誤按仲景原文當作但欲寐也十五葉四行故以小辛之藥溫散顧本作故以溫散之藥十六葉後五行已合治之薛本作已即合消之合治之顧本已作匕按當作各別搗篩已合治之薛顧本皆誤十七葉後四行熬香薛本香作干非十八葉八行氣上衝心中痛熱顧本重一心字是十九葉二行當不得食薛本顧本得俱作能按能字是二十葉後二行次治其厥顧本次作須後八行永宜此方薛本張本永俱作亦草一葉五行醫顧本作逆草二葉四行與太陰顧本無與字按原本與字疑衍
