front:
  text: 傷寒論音訓十七葉後三行苦侯切原本作若使切誤各本亦誤今依原本校字作苦侯切改按查玉篇芤字本音苦侯切知前人所改非妄故從之十八葉二行牡豕牡鼠原本牡皆誤作壯今改正十行金貍捕物按原本系破損下半字略有痕跡似善字薛本張本俱作之疑非修治藥法二十葉後十行注取自然汗汗當作汁二十三葉一行參原本破損以藥味次第考之當是玄參後九行原本破損不可考薛本顧本亦無張本作研細用後十行原本破損薛本張本作湯末作同上二作中立練按立練二字有誤二十四葉五行黑膏溫膏當作骨另修治藥法第二十葉至二十三葉止此四葉宋刻上排藥味上俱空一字今刻誤作頂格並證道光癸未歲吳門黃氏士禮㞐開雕同邑施南金書
