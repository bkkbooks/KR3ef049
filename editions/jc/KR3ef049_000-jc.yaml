body:
  text: 題宋刻龐安常傷寒總病論後郡中藏書家所謂朱奐文遊者余猶及見其人家多書以老故大半散去最後一單中有龐安常傷寒總病論亦第與群籍並出主人不以為宋刻估人之買者亦未知為宋刻也雜置坊間有識者過而識之以青蚨五星易歸自是我輩之好言收藏者皆爭相購矣是書先至小讀書堆顧抱沖家既而五硯樓袁壽階知之余亦知之因壽階先與議易故歸之抱沖先見是書遂先錄其副抱沖所錄余未之見見其友人施君少谷手錄本少谷時在抱沖家教其子弟習書法故見而借抄抄畢原書歸壽階余從之倩工影鈔一本統而計之宋刻一影宋刻者抱沖少谷與余有三矣厥後余與壽階以影鈔易宋刻是書遂為百宋一廛中物年來力絀舉而贈諸藝芸書舍不意壽階之影鈔者亦於其身後展轉歸藝芸於是刻與鈔盡為他人所有余則一無所有矣刻洪氏集驗方之冬余忽得一夢有人謂余何不再刻龐傷寒醒而異之遂商諸藝芸思借鈔入刻奈藝芸不允讓影鈔付梓而允借宋刻備校適少谷哲嗣稻香欣然掇贈其先人手澤付諸剞劂於是復以宋刻較影鈔而知少谷之影鈔為功不小也三卷三十三葉唯少谷影鈔本有之餘本都缺想少谷鈔後抱沖始鈔鈔時偶失之自是宋刻缺此葉已後影鈔本皆失之非余之重刻不知宋刻缺此葉非少谷之影鈔不知宋刻之原未缺此葉也書之經人拆散傳錄其弊有如此者不可不警也其中五卷十五葉宋本缺惟薛性天家鈔本有之字跡行款與原本殊未知何據後見抱沖所鈔者中亦有此葉謂是從王宇泰活字本補入今余復刻據薛本補據顧本校存其異同可耳宋刻不無誤處余復借張蒔塘家藏鈔本薛性天家藏鈔本顧容安家藏鈔本雖未知其同出一源與否而字有異同悉為標出可從者或改正文以就之未敢信者或存校語以參之余友張君訒庵素諳醫理共相參訂以定校勘數十條其任檢閱而草創者余長孫美鏐之力也是書自王宇泰活字印行之後未見重梓即王本相傳止有二百部故行世絕少余侄曾有之為友人借去被焚故未及一校為憾朋好中皆想望是書渴欲一見故命工梓行至於是書之深奧昔安常友人蘇黃兩公已詳言之不復丐當代名流之儒醫兼通者贅一言已道光癸未仲春黃丕烈識附錄跋龐安常傷寒論古之良醫皆不預為方何也病之來無窮而方不能盡使不工者惑其疑似而用之則害大矣惟仲景傷寒論論病處方纖悉必具又為之增損進退之法以豫告人嗟夫仁人之用心且非通神造妙者不能為也龐安常又竊憂其有病證而無方者續著為論數卷其用心為術非儷古人何以及茲淮南人謂龐安常能與傷寒說話豈不信然哉予將去黃欒仲實以黃別駕後序求予書而仲實之父為醫得龐君之妙謂予言何如也見張耒柯山集卷四十四
