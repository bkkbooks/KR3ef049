front:
  text: 卷第四一葉八行為暑病其熱此五字原本破去系描寫出者九行此行內除傷字而字三陽傳三字余皆描寫者十行如見按如字原本破去描作如字薛本如作而二葉十行豉半此二字原本破去今依薛本張本補後五行見形薛本形下有證字後六行豆壞一如薛本如下有候字張本在壞字下三葉三行腎熱病者按內經下有頤先赤三字後五行洗淅薛本同張本顧本俱作先淅按此亦內經刺熱文本作先淅似當從先為是後六行頭痛不任各本皆同按內經作頭痛不堪後九行胻酸薛本胻作腳非按內經作䯒酸四葉二行亡逆薛本顧本亡俱作無後四行苽蒂薛本顧本苽俱作瓜按當作瓜為是五葉五行注焉薛本張本俱作云顧本作也八行走疰薛本疰作注後一行五拾粒薛本張本下皆有去皮二字七葉五行甘草薛本無此味八葉五行謫居薛本謫作調非十行肉豆草𭁿薛本同前後五行七銖薛本作三錢又注於上方曰二十四銖為一兩合今之三錢是古之七銖也十葉二行每各本皆作毒按毒字是七行何由衰散大腑久祕薛本大作六顧本衰作表按當作衰為是十一葉三行隱𤺋薛本𤺋作疹十二葉四行杏仁麩炒原本炒字破去今依薛本顧本補後八行一盞薛本盞下有小字後九行永不發薛本發下尚有一發字後十行或下後薛本同顧本下字下有利字十三葉四行憎寒原本作增誤今依各本改後十行白濃薛本同顧本作膿按當作膿為是十四葉後十行自汗薛本張本同顧本作自安又黑厭薛本厭作靨十五葉四行嗽或喉痛薛本或作而
