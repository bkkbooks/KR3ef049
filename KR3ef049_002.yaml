body:
  text: 卷第二二葉七行指梢薛本梢作稍八行增寒顧本作憎是後六行翕翕熱薛本熱上有發字三葉三行憎寒原本作增誤今依薛本改以下憎寒及後三行皆仿此四葉六行注當發證顧本發下有汗字又注青龍湯似桂枝證薛本湯下有者字似作以按似字不誤五葉一行勢如薛本如作加按當作加是六葉八行黑夌薛本夌作麥後四行及顧本作皮後九行注蚌粉薛本蚌作拌非七葉一行以失薛本以作似後四行注此若軟緊而遲原本若字破損照薛本補張本同顧本作此浮緊而遲並無若字誤甚八葉後一行少氣逆薛本氣字下重一氣字按氣字當重為是後十行氣微絶顧本微作欲是九葉後七行谷不得前薛本前作消非十葉一行三勝薛本勝作升顧本同按當作升為是後八行五倍子薛本作五味子顧本同案小青龍湯本方有五味子無五倍子當作五味子為是十二葉一行去仁參薛本仁作人顧本同按當作人為是三行攴結薛本攴作支十四葉後七行互原本作玄誤顧本作弦薛本張本均作互按互字是今改十五葉後十行大柴胡胡湯薛本不重胡字顧本同按重者乃衍字也十八葉後一行在壯熱但主利薛本在作發主作下按當從發從下為是十九葉四行表證在薛本在上有仍字二十葉六行注閞上閞下薛本顧本皆作關上關下後二行咽躁薛本同顧本躁作燥按當作燥為是後三行方有薛本同顧本有作在按當作在為是二十一葉五行拘忌顧本忌作忽後二行煩喘顧本喘作渴二十三葉八行微喘顧本喘作熱二十四葉二行閞陰顧本作關四行同二十五葉一行桂枝甘草湯主之薛本作桂枝甘草龍骨牡蠣湯主之四行並宜火劫治之薛本宜下有依字後一行自為黃薛本自上有身字自作目後四行蓄血若去原本若作君誤今照各本改
