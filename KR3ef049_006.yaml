seq: 6
body:
  text: 卷第六四葉後六行大躁渴石膏薛本渴原作湯刪去石膏下原有飲子二字又塗去旁改栝蔞湯顧本作大躁石膏湯五葉後八行喉痹原本誤作候今改後九行腹潢薛本潢作滿六葉一行中央顧本央作先九行腹溜薛本腹作復後十行足指原本此字破損薛本作中張本作捲顧本亦作七葉二行節後原本此二字破損照張本補薛本作火誤又十五原本此二字亦破損照薛本張本補後二行足𪞘薛本顧本皆作冷後八行利里黑薛本里作黧張本作黧黑無利字顧本同按當從黧黑為是八葉五行得脈薛本得字下有汁按汁字當是汗字之誤七行熟寐而卒原本無卒字今依薛本張本補顧本亦無九葉二行得汗者薛本張本者下俱有生字六行代脈日死薛本張本日上俱有一字後五行汗汗薛本原作汗汗抹去一字張本顧本俱不重十葉後五行沖愈薛本張本沖俱作和後九行注太溪原本誤作大絡今照各本改十一葉一行太溪原本溪誤作貉今改八行吹則薛本吹作次顧本作久九行通氣薛本氣作脈按當從脈是十二葉一行覺此字原本半字破去描寫作學各本亦作學按文義似當作覺不當作學故以意改之七行華他本意也薛本張本句上皆有非字按此處文義似當有非字後四行復陰薛本顧本復俱作復按當從復為是十三葉六行故敢原本作故敗誤依薛本改九行淮薛本顧本俱作準張本作準後三行密窖薛本張本窖俱作守又方枝薛本枝作技顧本作板後十行其緝張本其作具十四葉五行頗知薛本知作著六行明然薛本張本明俱作炯十行雖薛本作惟後二行略意薛本張本意俱作述十五葉五行令王公張本顧本令俱作今又今增至四五百薛本張本此六字俱在上每兩千四五句下十六葉七行古引薛本作引古後七行安不薛本張本安俱作寧又千凂各本千俱作干
